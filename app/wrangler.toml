name               = "difference-engine-api"
compatibility_date = "2024-01-01"

[containers]
image = "registry.cloudflare.com/62aa79ca5a4eb69594dcd5b96f00b4bd/difference-engine:latest"

[vars]
R2_ACCOUNT_ID    = "62aa79ca5a4eb69594dcd5b96f00b4bd"
R2_STEMS_BUCKET  = "difference-engine-stems"
R2_OUTPUT_BUCKET = "difference-engine-output"
# Secrets (not stored here) — set once with:
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
# Use the value of `terraform output -raw r2_token` as the secret value.
