<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NLTL - DIFFERENCE ENGINE</title>
        <meta
            property="og:title"
            content="DIFFERENCE ENGINE: First Principles"
        />
        <meta
            property="og:image"
            content="https://de.nothinglefttolearn.com/og.png"
        />
        <meta property="og:url" content="https://de.nothinglefttolearn.com" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="bg.mp4" type="video/mp4" />
        </video>

        <div id="ui">
            <h1>DIFFERENCE ENGINE:<br />First Principles</h1>
            <div id="controls">
                <button id="playBtn" aria-label="Play">
                    <svg
                        class="icon-play"
                        width="18"
                        height="18"
                        viewBox="0 0 18 18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polygon points="4,2 16,9 4,16" />
                    </svg>
                    <svg
                        class="icon-pause"
                        width="18"
                        height="18"
                        viewBox="0 0 18 18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="5" y1="3" x2="5" y2="15" />
                        <line x1="11" y1="3" x2="11" y2="15" />
                    </svg>
                </button>
                <button id="downloadBtn" aria-label="Download">
                    <svg
                        width="18"
                        height="18"
                        viewBox="0 0 18 18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <line x1="9" y1="2" x2="9" y2="12" />
                        <polyline points="5,8 9,12 13,8" />
                        <line x1="2" y1="16" x2="16" y2="16" />
                    </svg>
                </button>
                <button id="refreshBtn" aria-label="Refresh">
                    <svg
                        width="18"
                        height="18"
                        viewBox="0 0 18 18"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.25"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M15 9A6 6 0 1 1 9 3" />
                        <polyline points="7,1 9,3 7,5" />
                    </svg>
                </button>
            </div>
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
            <div id="socials">
                <a id="aboutLink" href="#">About</a>
                <a
                    href="https://github.com/rorycaraher/difference-engine"
                    target="_blank"
                    >GitHub</a
                >
                <a
                    href="https://soundcloud.com/nothinglefttolearn"
                    target="_blank"
                    >SoundCloud</a
                >
            </div>
        </div>

        <div id="watermark">
            <p>NOTHING <span>LEFT</span></p>
            <p>__T O_ LEARN</p>
        </div>

        <div id="about-modal" role="dialog" aria-modal="true" aria-label="About">
            <div id="about-panel">
                <button id="about-close" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round">
                        <line x1="1" y1="1" x2="13" y2="13"/>
                        <line x1="13" y1="1" x2="1" y2="13"/>
                    </svg>
                </button>
                <div id="about-content"><!-- ABOUT_CONTENT --></div>
            </div>
        </div>

        <script src="script.js"></script>
        <script
            data-goatcounter="https://analytics.de.nothinglefttolearn.com/count"
            async
            src="//analytics.de.nothinglefttolearn.com/count.js"
        ></script>
    </body>
</html>
